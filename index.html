<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-width=1.0">
<title>Video Downloader</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 20px;
    background-color: #f4f4f9;
    color: #333;
  }
  .downloader-container {
    max-width: 400px;
    margin: 40px auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  input {
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
    outline: none;
  }
  input:focus {
    border-color: #007bff;
  }
  button {
    padding: 12px;
    font-size: 16px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: background-color 0.2s;
  }
  button:hover {
    background-color: #0056b3;
  }
  #status {
    font-size: 14px;
    color: #666;
    text-align: center;
    margin-top: 5px;
  }
</style>
</head>
<body>

<div class="downloader-container">
  <h3 style="margin-top: 0; text-align: center;">Direct Link Downloader</h3>
  <input type="url" id="videoUrl" placeholder="Enter direct video URL (e.g., .mp4)">
  <button onclick="downloadVideo()">Download Video</button>
  <p id="status"></p>
</div>

<script>
  async function downloadVideo() {
    const url = document.getElementById('videoUrl').value.trim();
    const statusEl = document.getElementById('status');
    
    if (!url) {
      statusEl.style.color = "red";
      statusEl.innerText = "Please enter a valid URL.";
      return;
    }

    statusEl.style.color = "#333";
    statusEl.innerText = "Fetching video... please wait.";

    try {
      // Fetch the video file as a Blob to force download instead of playback
      const response = await fetch(url);
      
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      
      const blob = await response.blob();
      
      // Create a temporary object URL for the downloaded Blob
      const downloadUrl = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      
      // Try to extract a clean filename from the URL, otherwise use a default
      let fileName = url.split('/').pop().split('?')[0];
      if (!fileName.includes('.')) {
        fileName = 'downloaded_video.mp4';
      }
      
      // Trigger the hidden download link
      a.href = downloadUrl;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      
      // Cleanup the DOM and memory
      document.body.removeChild(a);
      window.URL.revokeObjectURL(downloadUrl);
      statusEl.style.color = "green";
      statusEl.innerText = "Download complete!";
      
    } catch (error) {
      console.error("Download failed:", error);
      statusEl.style.color = "red";
      statusEl.innerText = "Failed to download. The server is likely blocking direct access via CORS.";
    }
  }
</script>

</body>
</html>
